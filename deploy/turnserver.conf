# coturn config for LiarBar voice chat
# Install to /etc/turnserver.conf on the VM; it is mounted read-only into the
# coturn Docker container (see run-coturn.sh). Runs with --network host.
#
# Replace the __PLACEHOLDERS__ before use:
#   __PUBLIC_IP__   -> the VM's Azure PUBLIC IP (Portal > VM > Overview)
#   __PRIVATE_IP__  -> the VM's PRIVATE IP        (run `hostname -I` on the VM)
#   __REALM__       -> your domain, e.g. liarbar.duckdns.org
#   __TURN_USER__   -> a username you choose
#   __TURN_PASS__   -> a strong password you choose
#
# Azure is behind 1:1 NAT, so coturn MUST be told the public/private mapping,
# otherwise it hands out unreachable candidates and TURN silently fails.

# --- Listening ---
listening-port=3478
# Bind to all interfaces (the private IP); advertise the public IP via external-ip.
listening-ip=__PRIVATE_IP__
external-ip=__PUBLIC_IP__/__PRIVATE_IP__

# --- Relay port range (must be opened in the Azure NSG as UDP) ---
# Kept small on purpose so the firewall rule is manageable.
min-port=49160
max-port=49200

# --- Authentication (long-term credentials) ---
lt-cred-mech
realm=__REALM__
user=__TURN_USER__:__TURN_PASS__

# --- Hygiene / hardening ---
fingerprint
no-cli
no-multicast-peers
# Block relaying to private ranges so the server can't be abused as a proxy.
no-loopback-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# --- Logging ---
log-file=/var/log/turnserver/turn.log
simple-log

# --- TLS (OPTIONAL) ---
# Plain turn: on 3478 works fine even from your HTTPS Vercel frontend, so TLS
# is optional. To enable turns: on 5349, obtain a cert (certbot for your
# duckdns domain) and uncomment:
# tls-listening-port=5349
# cert=/etc/letsencrypt/live/__REALM__/fullchain.pem
# pkey=/etc/letsencrypt/live/__REALM__/privkey.pem
