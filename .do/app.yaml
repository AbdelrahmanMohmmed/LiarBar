# DigitalOcean App Platform spec.
# Use it via: Apps -> Create App -> import from this repo, or
#   doctl apps create --spec .do/app.yaml
name: liarbar-server
region: fra
services:
  - name: server
    github:
      repo: AbdelrahmanMohmmed/LiarBar
      branch: main
      deploy_on_push: true
    source_dir: server
    environment_slug: node-js
    build_command: npm ci && npm run build
    run_command: npm start
    http_port: 3001
    # IMPORTANT: keep instance_count at 1 — room state is in-memory,
    # a second instance would not see rooms created on the first.
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/health
    envs:
      - key: PORT
        scope: RUN_TIME
        value: "3001"
      - key: ALLOWED_ORIGINS
        scope: RUN_TIME
        # Set this to your real frontend origin(s), comma-separated
        value: "https://liar-bar.vercel.app"
